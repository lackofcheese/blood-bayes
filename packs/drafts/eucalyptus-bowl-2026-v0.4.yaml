evidence:
  - evidence_id: eucalyptus_pdf_roster_rules
    source_id: eucalyptus_pdf
    extraction_method: llm_pdf
    locator: PDF pages 3-4, Team Creation and inducement lists
    structured_reference: No tiers; 1.25m shared Gold; advancement prices and caps; minimum 11 players; no Stars, Secondary skills, or characteristic improvements; named allowed and banned inducements.
    notes: Independent AI reviewers agreed on the transcription; catalog ID normalization and external prices remain for human review.
  - evidence_id: eucalyptus_pdf_games
    source_id: eucalyptus_pdf
    extraction_method: llm_pdf
    locator: PDF page 2, Saturday and Sunday schedule
    structured_reference: Games 1-3 are scheduled Saturday and Games 4-6 Sunday.
  - evidence_id: eucalyptus_pdf_scoring
    source_id: eucalyptus_pdf
    extraction_method: llm_pdf
    locator: PDF pages 5 and 15, Points, Tiebreaks, and round examples
    structured_reference: Win/draw/loss score 80/40/10; five ordered tiebreakers; source-defined Median Opponents Score calculation drops the highest and lowest opponent averages when applicable.
  - evidence_id: eucalyptus_pdf_event_signals
    source_id: eucalyptus_pdf
    extraction_method: llm_pdf
    locator: PDF pages 5, 8, 10-11, and 15
    structured_reference: Results, opponent scores, prizes, and reporting are coach-level, but the document never labels the event open, team, or squad and gives no pairing method.
  - evidence_id: eucalyptus_pdf_progression_gap
    source_id: eucalyptus_pdf
    extraction_method: llm_pdf
    locator: whole-document AI sweep, PDF pages 1-17
    structured_reference: No explicit resurrection, recovery, retained-injury, SPP, or between-game progression clause was found.
    notes: Absence found by AI is a review finding, not proof of a progression mode.
  - evidence_id: eucalyptus_pdf_other_rules
    source_id: eucalyptus_pdf
    extraction_method: llm_pdf
    locator: PDF pages 3, 5-6, and 8-14
    structured_reference: Minimum roster, discarded Gold, incorporated rules, awards, painting penalty, result administration, clocks, slow-play sanctions, local play conventions, default result, conduct, and removal.
  - evidence_id: eucalyptus_identity
    source_id: eucalyptus_roster_manifest
    extraction_method: roster_builder_import
    locator: top-level identity and source
    structured_reference: id, name, rulesEdition, and pinned organizer source
  - evidence_id: eucalyptus_roster_rules
    source_id: eucalyptus_roster_manifest
    extraction_method: roster_builder_import
    locator: sourceModel and supported clauses
    structured_reference: sharedGold, advancement costs/caps, Elite caps, Stars, and inducements
  - evidence_id: eucalyptus_executable_crosscheck
    source_id: eucalyptus_roster_format
    extraction_method: roster_builder_import
    locator: tables, sets, values, construction, and constraints
    structured_reference: 31 race rows and executable roster-legality policy
  - evidence_id: eucalyptus_non_roster_gap
    source_id: eucalyptus_roster_manifest
    extraction_method: roster_builder_import
    locator: clauses.tournament-play
    quote: Scoring, tie-breaks, match timing, prizes, and administration are outside single-roster construction.
    notes: This derived summary is a review queue, not proof of the omitted values.

