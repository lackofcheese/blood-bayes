groups:
  all:
    label: All legal races
    team_gold: 1250000
    skill_funding:
      mode: shared_team_gold
      unit: gold
    skill_rules:
      primary_cost: 20000
      elite_primary_cost: 30000
      elite_skills: [block, dodge, guard, mighty_blow]
      max_added_skills_per_player: 1
      per_skill_caps: {block: 4, dodge: 4, guard: 4, mighty_blow: 4}
      secondary_allowed: false
      characteristic_improvements_allowed: false
    stars:
      policy: banned
      max_count: 0
    inducements:
      policy: restricted
      allowed_ids:
        - temp_agency_cheerleaders
        - team_mascot
        - weather_mage
        - blitzers_best_kegs
        - bribe
        - wandering_apothecary
        - halfling_master_chef
        - biased_referee
        - infamous_coaching_staff
        - wizard
        - plague_doctor
        - riotous_rookies
        - mortuary_assistant
        - custom:canopic_jar
        - custom:bretonnian_pastries
        - custom:bretonnian_damsel
      banned_ids: [prayers_to_nuffle, part_time_assistant_coaches, extra_team_training, mercenary_players]
      overrides:
        - {inducement_id: "custom:canopic_jar", cost: 50000, max_count: 1}
        - {inducement_id: "custom:bretonnian_pastries", cost: 15000, max_count: 1}
        - {inducement_id: "custom:bretonnian_damsel", cost: 150000, max_count: 1}
      notes:
        - The PDF names Josef Bugman, Sports Wizard, and Dodgy League Rep variants; generic catalog IDs may be over-broad.
        - The PDF prints Plaque Doctor; plague_doctor is an unreviewed apparent-typo normalization.
        - Custom inducement costs and caps come from derived catalog evidence, not values printed in this PDF.

global_rules:
  games: 6
  progression: null
  scoring:
    win_points: 80
    draw_points: 40
    loss_points: 10
    tiebreakers:
      - source-defined Median Opponents Score
      - touchdown differential
      - touchdowns total
      - casualty differential
      - casualties total
  event_structure: null

other_rules:
  - rule_id: minimum_roster_size
    source_clause_id: team-creation
    summary: A team must begin with at least 11 players; schema v0 has no roster-size constraint.
    materiality: not_modelled
  - rule_id: unspent_construction_gold
    source_clause_id: team-creation
    summary: Unspent construction Gold is discarded and cannot be retained for later use.
    materiality: not_modelled
  - rule_id: median_opponents_score
    source_clause_id: scoring-and-tiebreaks
    summary: The first tiebreak is a source-defined trimmed sum of opponent points-per-game, not a conventional statistical median.
    materiality: not_modelled
  - rule_id: incorporated_rules
    source_clause_id: ruleset
    summary: The pack incorporates BB2025, a linked FAQ, mutable NAF recommendations, and a printed Slann roster; the external versions are not all digest-pinned.
    materiality: needs_review
  - rule_id: awards_and_prize_allocation
    source_clause_id: prizes
    summary: The pack defines ordered individual awards, painting voting, and Best-in-Race and prize-table allocation.
    materiality: not_modelled
  - rule_id: painting_penalty
    source_clause_id: presentation
    summary: Teams require minimum presentation standards and may receive a discretionary 10-point penalty for each game deemed insufficiently painted.
    materiality: not_modelled
  - rule_id: results_administration
    source_clause_id: bbtm
    summary: Both coaches submit touchdowns and casualties through BBTM; mismatches are resolved by the organizer.
    materiality: admin_only
  - rule_id: match_timing_and_clocks
    source_clause_id: match-timing
    summary: Games last 2h20; the pack defines dice-down authority, chess-clock triggers, expired-clock procedures, and slow-play sanctions.
    materiality: not_modelled
  - rule_id: local_match_conventions
    source_clause_id: rules-queries
    summary: Organizer rulings are final; the pack defines cocked dice, prone/stunned markers, take-backs, and moved-player facing conventions.
    materiality: not_modelled
  - rule_id: late_attendance_default
    source_clause_id: attendance
    summary: Late absence after an organizer-discretion grace period is a concession recorded as a 2-touchdown, 2-casualty victory.
    materiality: not_modelled
  - rule_id: conduct_and_removal
    source_clause_id: conduct
    summary: Conduct and responsible-drinking requirements apply, with removal from the event as a possible sanction.
    materiality: admin_only
  - rule_id: event_logistics
    source_clause_id: administration
    summary: Dates, venue, submission deadline, fees, equipment, attendance, merchandise, acknowledgements, and historical winners are administrative.
    materiality: admin_only
